---
layout: default
---
<article class="page news">
  <h1>{{ page.title }}</h1>
  {{ content }}
  <ul class="post-list">
    {% for post in site.posts %}
    <li>
      <span class="post-list-date">{{ post.date | date: "%b %-d, %Y" }}</span>
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
    </li>
    {% endfor %}
  </ul>
</article>
